body:
  text: 要用字苑塔佛堂也釋元應妙法蓮華經音義好惡上呼號下烏故反顏氏家訓音辭篇鼾呼干反江南行此音四分律音義貶莊狹反目數開閉也正法念經音義凹陷也凸起也大乘莊嚴經論音義影音於景反顏氏家訓書證篇跣四典反四分律音義腝柔脆也正法念經音義佛本行集經音義饐音懿饐餿臭也餿色留反陸德明爾雅釋文竱音剬宋庠國語補音卷二舊音引㾪所景反眚瘦也病也佛本行集經音義突突也大乘成業論音義丳初眼反今之炙肉丳字也大智度論音義修道地經音議棖丈庚反棖觸也又嫽敞敞觸亦作敞音丈衡反四分律音義楉酒梁書劉杳傳有人餉昉楉酒而作榐字昉問杳曰此字是否杳對曰葛洪字苑作木旁若南史杳傳作榐菌今人呼菌為菌世作椹𧀯二字非也爾雅釋文葰私佳反阿毗達磨俱舍論音義盧葛反同上粔籹膏環果也金色王經音義粄布滿反餈類也解脫道論音義𨦂連絲釣曰𨦂來改切廣韻上聲十五海𨦂字注𨦂同𨦂李如真篇海焉若訓何訓安當音於愆反於焉逍遙於焉嘉客焉用佞焉得仁之類是也若送句及助語當音矣愆反故稱龍焉故稱血焉有民人焉有社稷焉託始焉晉鄭焉依之類是也江南至今行此顏氏家訓音辭篇然猶爾也謂相和同諾者何也謂然諾相信雖死不顧也史記張耳陳餘列傳司馬貞索隱㷿𦳫也正法華經音義厭眠內不祥也山東音於葉反大方等大集經音義大智度論者義梵音凡泛反梵潔也妙法蓮華經音義氍氍強朱雙朱反四分律音義佹音九偽反字見廣雅及陳思王集也顏氏家訓書證篇靸鞮素合都奚反四分律音義韢苴履底著之言相丁著也爾雅釋文祗禔巨兒之移反法服也或作竭支或作僧迦支或作僧迦鴟梵言訛轉也四分律音義袈娑同上云字本從毛作毠㲚葛洪後作字苑始改從衣袂標也衣袖也謂揎衣袖出臂為攘袂也大莊嚴經論音義釃所寄反謂以篚盝酒盝音鹿毛詩釋文引葛洪
